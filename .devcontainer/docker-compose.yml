version: '3.8'

services:
  devenv:
    build:
      context: .
      dockerfile: Dockerfile
    image: sqlpassion/kaos-devenv:latest
    container_name: kaos-devcontainer
    volumes:
      - ..:/workspace:cached
      # Faster builds by avoiding the macOS host I/O sync on the target directory. Since the
      # Cargo workspace migration ALL build output lives in the shared main64/target/, so a
      # single volume is enough here.
      # IMPORTANT: only ever mount the target/ directory, never a source folder like
      # user_programs/ — otherwise the volume shadows the source code and freezes it.
      - workspace-target:/workspace/main64/target
      - cargo-cache:/root/.cargo
    network_mode: bridge
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: /bin/sh -c "while sleep 1000; do :; done"

volumes:
  workspace-target:
  cargo-cache:
