[build]
target = "x86_64-unknown-none"

[target.x86_64-unknown-none]
rustflags = [
    "-C", "link-arg=-Tkaosldr_64/link.ld",
    "-C", "link-arg=-z",
    "-C", "link-arg=max-page-size=0x1000",
    "-C", "code-model=large",
    "-C", "relocation-model=static",
    "-C", "no-redzone=yes",
]
linker = "rust-lld"
